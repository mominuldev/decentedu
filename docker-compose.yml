name: decentedu

x-app-image: &app-image
  build:
    context: .
    dockerfile: Dockerfile
  image: decentedu-app:local
  env_file: .env
  depends_on:
    mysql:
      condition: service_healthy
    redis:
      condition: service_started
  volumes:
    - storage:/var/www/html/storage
    # Named volume auto-populates from the image's baked-in build on first boot, so nginx
    # (which can't see the app image's filesystem) can serve the same compiled assets.
    - public-build:/var/www/html/public/build

services:
  nginx:
    image: nginx:alpine
    ports:
      - "${APP_PORT:-8000}:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - public-build:/var/www/html/public/build:ro
    depends_on:
      - app

  app:
    <<: *app-image
    container_name: decentedu-app

  horizon:
    <<: *app-image
    container_name: decentedu-horizon
    command: ["php", "artisan", "horizon"]
    restart: unless-stopped

  scheduler:
    <<: *app-image
    container_name: decentedu-scheduler
    entrypoint: ["sh", "-c"]
    command: ["while true; do php artisan schedule:run --verbose --no-interaction; sleep 60; done"]
    restart: unless-stopped

  mysql:
    image: mysql:8
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-decentedu}
      MYSQL_USER: ${DB_USERNAME:-decentedu}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootsecret}
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    volumes:
      - redis-data:/data

volumes:
  mysql-data:
  redis-data:
  storage:
  public-build:
